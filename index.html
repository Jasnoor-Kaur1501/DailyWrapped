<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyWrapped</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111114;
  --surface: #1a1a1f;
  --surface2: #222228;
  --border: rgba(255,255,255,0.07);
  --text: #f4f0ff;
  --muted: rgba(244,240,255,0.45);
  --dim: rgba(244,240,255,0.15);
  --accent: #c084fc;
  --accent2: #fb923c;
  --font: 'Bricolage Grotesque', sans-serif;
  --serif: 'Fraunces', serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

body { min-height: 100vh; }

/* PAGES */
.page { display: none; min-height: 100vh; }
.page.active { display: flex; flex-direction: column; animation: fadeUp 0.4s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── HEADER (shared) ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
}

.logo em {
  font-style: italic;
  font-family: var(--serif);
  font-weight: 300;
  color: var(--accent);
}

.top-date {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.03em;
}

/* ════════════════════
   PAGE 1: LOG
════════════════════ */
#page-log {
  flex-direction: column;
}

.log-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 360px;
  overflow: hidden;
}

/* LEFT — add song form */
.log-form-wrap {
  padding: 32px 36px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 16px;
}

.input-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 7px;
  display: block;
  letter-spacing: 0.04em;
}

.inp {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  padding: 13px 16px;
  outline: none;
  transition: border-color 0.2s;
}
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--dim); }

/* MOOD PILLS */
.mood-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.mood-pill {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
}
.mood-pill.active {
  background: var(--accent);
  color: #111114;
  border-color: var(--accent);
}

/* COLOR PICKER ROW */
.color-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.color-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: transform 0.15s;
}
.color-dot:hover { transform: scale(1.15); }
.color-dot.active { border-color: var(--text); transform: scale(1.1); }

.add-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  color: #111114;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 800;
  padding: 15px;
  cursor: pointer;
  transition: all 0.18s;
  margin-top: 8px;
  letter-spacing: 0.01em;
}
.add-btn:hover { opacity: 0.88; transform: scale(0.99); }
.add-btn:active { transform: scale(0.97); }

/* RIGHT — song list */
.log-list-wrap {
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.song-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
}

.clear-btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.clear-btn:hover { color: #e05a5a; }

.song-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }

.song-item {
  background: var(--surface);
  border-radius: 14px;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 13px;
  border: 1px solid var(--border);
  animation: fadeUp 0.3s ease;
}

.song-color-blob {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.song-info { flex: 1; min-width: 0; }

.song-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-artist {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-mood-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}

.song-delete {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 16px;
  padding: 2px 4px;
  transition: color 0.15s;
  flex-shrink: 0;
}
.song-delete:hover { color: #e05a5a; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--dim);
  text-align: center;
  padding: 40px 0;
}

.empty-icon { font-size: 40px; }
.empty-text { font-size: 13px; font-weight: 400; font-style: italic; font-family: var(--serif); }

/* BOTTOM BAR */
.log-bottom {
  border-top: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.lb-info {
  font-size: 13px;
  color: var(--muted);
}

.lb-info strong { color: var(--text); font-weight: 700; }

.wrap-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 12px;
  color: #111114;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 800;
  padding: 12px 28px;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.01em;
}
.wrap-btn:hover { opacity: 0.9; transform: scale(0.99); }
.wrap-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* ════════════════════
   PAGE 2: WRAPPED CARD
════════════════════ */
#page-wrapped {
  align-items: center;
  justify-content: flex-start;
  padding: 32px 24px 48px;
  overflow-y: auto;
}

.card-wrap {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* HERO CARD */
.hero-card {
  border-radius: 24px;
  padding: 36px 32px;
  position: relative;
  overflow: hidden;
  min-height: 260px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.hero-bg-blobs {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(48px);
  opacity: 0.55;
}

.hero-content { position: relative; z-index: 1; }

.hero-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 12px;
}

.hero-date {
  font-family: var(--serif);
  font-size: 42px;
  font-style: italic;
  font-weight: 300;
  color: #fff;
  line-height: 1.1;
  margin-bottom: 6px;
  letter-spacing: -1px;
}

.hero-count {
  font-size: 14px;
  font-weight: 600;
  color: rgba(255,255,255,0.65);
}

.hero-top-song {
  position: relative;
  z-index: 1;
}

.hts-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 6px;
}

.hts-title {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  line-height: 1.2;
}

.hts-artist {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.6);
}

/* STATS GRID */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.stat-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px 22px;
}

.st-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.st-val {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1;
  margin-bottom: 4px;
}

.st-sub {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
}

/* MOOD BREAKDOWN */
.mood-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px;
}

.mood-card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.mood-bar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.mood-bar-item:last-child { margin-bottom: 0; }

.mbi-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  min-width: 72px;
}

.mbi-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 6px;
  overflow: hidden;
}

.mbi-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}

.mbi-count {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  min-width: 20px;
  text-align: right;
}

/* SONG LIST CARD */
.songs-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px;
}

.songs-card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

.mini-song {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.mini-song:last-child { border-bottom: none; }

.mini-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--dim);
  min-width: 18px;
}

.mini-blob {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.mini-info { flex: 1; min-width: 0; }

.mini-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.mini-artist {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* ACTION BUTTONS */
.card-actions {
  display: flex;
  gap: 10px;
}

.ca-btn {
  flex: 1;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  padding: 15px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.18s;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
}
.ca-btn:hover { background: var(--surface2); }

.ca-btn-grad {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #111114;
  border: none;
}
.ca-btn-grad:hover { opacity: 0.9; }

/* MOBILE */
@media (max-width: 700px) {
  .log-body { grid-template-columns: 1fr; }
  .log-form-wrap { border-right: none; border-bottom: 1px solid var(--border); }
  .log-form-wrap { padding: 24px 20px; }
  .log-list-wrap { padding: 24px 20px; }
  #page-wrapped { padding: 24px 16px 48px; }
}
</style>
</head>
<body>

<!-- ════ PAGE 1: LOG ════ -->
<div class="page active" id="page-log">
  <div class="top-bar">
    <div class="logo">Daily<em>Wrapped</em></div>
    <div class="top-date" id="topDate"></div>
  </div>

  <div class="log-body">
    <!-- FORM -->
    <div class="log-form-wrap">
      <div class="section-label">Add a song</div>

      <div class="input-group">
        <label class="input-label">Song title</label>
        <input class="inp" type="text" id="inpTitle" placeholder="e.g. Espresso" />
      </div>

      <div class="input-group">
        <label class="input-label">Artist</label>
        <input class="inp" type="text" id="inpArtist" placeholder="e.g. Sabrina Carpenter" />
      </div>

      <div class="input-group">
        <label class="input-label">Mood</label>
        <div class="mood-pills">
          <button class="mood-pill active" data-mood="🔥 Hyped">🔥 Hyped</button>
          <button class="mood-pill" data-mood="💜 Emotional">💜 Emotional</button>
          <button class="mood-pill" data-mood="✨ Vibing">✨ Vibing</button>
          <button class="mood-pill" data-mood="😮‍💨 Chill">😮‍💨 Chill</button>
          <button class="mood-pill" data-mood="💔 Sad">💔 Sad</button>
          <button class="mood-pill" data-mood="🌙 Midnight">🌙 Midnight</button>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Color</label>
        <div class="color-row" id="colorRow"></div>
      </div>

      <button class="add-btn" onclick="addSong()">+ Add song</button>
    </div>

    <!-- LIST -->
    <div class="log-list-wrap">
      <div class="list-header">
        <div class="song-count" id="songCount">0 songs today</div>
        <button class="clear-btn" onclick="clearAll()">clear all</button>
      </div>
      <div class="song-list" id="songList">
        <div class="empty-state">
          <div class="empty-icon">🎵</div>
          <div class="empty-text">songs you've played today will appear here</div>
        </div>
      </div>
    </div>
  </div>

  <div class="log-bottom">
    <div class="lb-info">add at least <strong>3 songs</strong> to generate your wrap</div>
    <button class="wrap-btn" id="wrapBtn" onclick="showWrapped()" disabled>Generate wrap →</button>
  </div>
</div>
