<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyWrapped</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111114;
  --surface: #1a1a1f;
  --surface2: #222228;
  --border: rgba(255,255,255,0.07);
  --text: #f4f0ff;
  --muted: rgba(244,240,255,0.45);
  --dim: rgba(244,240,255,0.15);
  --accent: #c084fc;
  --accent2: #fb923c;
  --font: 'Bricolage Grotesque', sans-serif;
  --serif: 'Fraunces', serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

body { min-height: 100vh; }

/* PAGES */
.page { display: none; min-height: 100vh; }
.page.active { display: flex; flex-direction: column; animation: fadeUp 0.4s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── HEADER (shared) ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
}

.logo em {
  font-style: italic;
  font-family: var(--serif);
  font-weight: 300;
  color: var(--accent);
}

.top-date {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.03em;
}

/* ════════════════════
   PAGE 1: LOG
════════════════════ */
#page-log {
  flex-direction: column;
}

.log-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 360px;
  overflow: hidden;
}

/* LEFT — add song form */
.log-form-wrap {
  padding: 32px 36px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 16px;
}

.input-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 7px;
  display: block;
  letter-spacing: 0.04em;
}

.inp {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  padding: 13px 16px;
  outline: none;
  transition: border-color 0.2s;
}
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--dim); }

/* MOOD PILLS */
.mood-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.mood-pill {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
}
.mood-pill.active {
  background: var(--accent);
  color: #111114;
  border-color: var(--accent);
}

/* COLOR PICKER ROW */
.color-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.color-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: transform 0.15s;
}
.color-dot:hover { transform: scale(1.15); }
.color-dot.active { border-color: var(--text); transform: scale(1.1); }

.add-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  color: #111114;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 800;
  padding: 15px;
  cursor: pointer;
  transition: all 0.18s;
  margin-top: 8px;
  letter-spacing: 0.01em;
}
.add-btn:hover { opacity: 0.88; transform: scale(0.99); }
.add-btn:active { transform: scale(0.97); }

/* RIGHT — song list */
.log-list-wrap {
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.song-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
}

.clear-btn {
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.clear-btn:hover { color: #e05a5a; }

.song-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }

.song-item {
  background: var(--surface);
  border-radius: 14px;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  gap: 13px;
  border: 1px solid var(--border);
  animation: fadeUp 0.3s ease;
}

.song-color-blob {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.song-info { flex: 1; min-width: 0; }

.song-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-artist {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-mood-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}

.song-delete {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 16px;
  padding: 2px 4px;
  transition: color 0.15s;
  flex-shrink: 0;
}
.song-delete:hover { color: #e05a5a; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--dim);
  text-align: center;
  padding: 40px 0;
}
