<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyWrapped</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,700;12..96,800&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #111114;
  --surface: #1a1a1f;
  --surface2: #222228;
  --border: rgba(255,255,255,0.07);
  --text: #f4f0ff;
  --muted: rgba(244,240,255,0.45);
  --dim: rgba(244,240,255,0.15);
  --accent: #c084fc;
  --accent2: #fb923c;
  --font: 'Bricolage Grotesque', sans-serif;
  --serif: 'Fraunces', serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

body { min-height: 100vh; }

/* PAGES */
.page { display: none; min-height: 100vh; }
.page.active { display: flex; flex-direction: column; animation: fadeUp 0.4s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── HEADER (shared) ── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
}

.logo em {
  font-style: italic;
  font-family: var(--serif);
  font-weight: 300;
  color: var(--accent);
}

.top-date {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.03em;
}

/* ════════════════════
   PAGE 1: LOG
════════════════════ */
#page-log {
  flex-direction: column;
}

.log-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 360px;
  overflow: hidden;
}

/* LEFT — add song form */
.log-form-wrap {
  padding: 32px 36px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}
